<!-- Globally available button to open/close form -->
<div id="sample_floating_button">
    <button id="visibility_btn"
            class="floating_action_btn"
            aria-expanded="false"
            aria-label="Open form"
            data-i18n="openForm"
            title="Open form">
        <span aria-hidden="true" class="floating_action_btn_icon"></span>
    </button>
</div>
